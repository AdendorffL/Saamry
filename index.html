<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-eb-app-title" content="Saamry" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="images/icons/icon-192.png" />
    <title>Saamry</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- == LOGIN SCREEN == -->
    <section id="login-screen" class="screen">
        <div class="login-logo">
            <span>Saamry</span>
            <p>who are you?</p>
        </div>

        <div id="user-buttons" class="user-buttons"></div>

        <div class="password-row">
            <input id="password-input" class="input" type="password" placeholder="Password" autocomplete="current-password" />
            <button id="login-btn" class="login-btn">Go →</button>
        </div>

        <div id="login-error" class="login-error"></div>

    </section>

    <!-- == MAIN SCREEN == -->
    <section id="main-screen" class="screen">
        <div class="topbar">
            <span class="topbar-title">Entry</span>
            <div style="display:flex; gap:8px">
                <button id="charts-btn" class="icon-btn" title="View history">📊</button>
                <button id="logout-btn" class="icon-btn" title="Log out">↩</button>
            </div>
        </div>

        <div id="greeting" class="greeting"></div>
        <div id="date-label" class="date-label"></div>

        <div class="amount-card">
            <div class="amount-label">Amount</div>
            <input id="amount-input" class="amount-input" type="number" inputmode="decimal" placeholder="0" />
        </div>

        <input id="note-input" class="input note-input" type="text" placeholder="Note (optional)" maxlength="100"/>

        <div class="amount-label" style="margin-bottom: 10px">Applies to</div>
        <div id="checkbox-list" class="checkbox-card"></div>

        <button id="submit-btn" class="submit-btn">Save Entry</button>
    </section>

    <!-- == CHARTS SCREEN == -->
    <section id="charts-screen" class="screen">
        <div class="topbar">
            <button id="back-btn" class="icon-btn" title="Back">←</button>
            <span id="charts-title" class="topbar-title"></span>
            <div style="width:40px"></div>
        </div>
    </section>
</div>

<div id="toast" class="toast"></div>

<!-- Supabase SDK-->
<script src="https://cdn.jsdelivr.net/npm/@supabase-js@2"></script>

 <!-- App Scripts -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db..js"></script>
<script src="js/app.js"></script>

<!-- Service Worker Registration -->
 <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
 </script>
</body>
</html>
